name: Auto-Updater

on:
  schedule:
    # Запускати оновлення кожен день о 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Дозволяє запускати вручну

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git commit -m "Автоматичне оновлення каталогу ШІ" || echo "No changes to commit"
          git push
